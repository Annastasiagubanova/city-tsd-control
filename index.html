<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг ТСД</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; z-index: 9999; font-family: sans-serif;">
    <div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 320px;">
        <h2 style="margin-top: 0; color: #333; font-size: 22px;">Вход в панель ТСД</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Введите данные учетной записи Firebase</p>
        
        <input type="email" id="loginEmail" placeholder="Email (например, admin@tsd.control)" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 15px;" />
        <input type="password" id="loginPassword" placeholder="Пароль" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 15px;" />
        
        <button id="loginBtn" style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px;">Войти</button>
        
        <p id="error-msg" style="color: #dc3545; font-size: 14px; margin-top: 10px; display: none;">❌ Неверный логин или пароль!</p>
    </div>
</div>

<div class="dashboard" style="display: none; padding: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="margin: 0;">Система мониторинга ТСД</h1>
        <button id="logoutBtn" style="padding: 8px 15px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Выйти</button>
    </div>
    
    <div class="tabs-container">
        <button id="btn-status" class="tab-btn active">📊 Состояние ТСД</button>
        <button id="btn-logs" class="tab-btn">📜 Журнал событий</button>
    </div>

    <div id="tab-status-content">
        <div id="tsd-list">загрузка данных из Firebase...</div>
    </div>

    <div id="tab-logs-content" style="display: none;">
        <div class="log-container" style="margin-top: 10px; font-family: sans-serif;">
            <h2>История логов</h2>
            <input type="text" id="tsdFilter" placeholder="Поиск по номеру ТСД..." style="padding: 8px; width: 100%; max-width: 300px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px;" />
            <div id="log-list">Загрузка журнала...</div>
        </div>
    </div>
</div>

<script type="module">
    // Выровнял версии до 10.8.1 для стабильности
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyCOpoWOygfpw0f9FJzWIEaqmhbUCS-RmEU",
        authDomain: "city-tsd-control.firebaseapp.com",
        databaseURL: "https://city-tsd-control-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "city-tsd-control",
        storageBucket: "city-tsd-control.firebasestorage.app",
        messagingSenderId: "1086724572042",
        appId: "1:1086724572042:web:4a19851bcb25d45381be73"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const auth = getAuth(app); // Инициализация авторизации

    const authScreen = document.getElementById('auth-screen');
    const dashboard = document.querySelector('.dashboard');

    // --- ЛОГИКА АВТОРИЗАЦИИ (Блокировка экрана) ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Если пользователь залогинен — пускаем в систему
            authScreen.style.display = 'none';
            dashboard.style.display = 'block';
        } else {
            // Если не залогинен — принудительно показываем окно входа
            authScreen.style.display = 'flex';
            dashboard.style.display = 'none';
        }
    });

    // Обработка кнопки "Войти"
    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errorMsg = document.getElementById('error-msg');

        errorMsg.style.display = 'none'; // Скрываем старые ошибки

        signInWithEmailAndPassword(auth, email, password)
            .catch((error) => {
                console.error("Ошибка входа:", error);
                errorMsg.style.display = 'block'; // Показываем текст ошибки
            });
    });

    // Обработка кнопки "Выйти"
    document.getElementById('logoutBtn').addEventListener('click', () => {
        signOut(auth).catch((error) => console.error("Ошибка выхода:", error));
    });

    // --- ТАБЛИЦА ТЕКУЩЕГО СОСТОЯНИЯ ТСД ---
    const terminalsRef = ref(database, 'terminals');
    
    onValue(terminalsRef, (snapshot) => {
        const data = snapshot.val();
        const displayDiv = document.getElementById('tsd-list');

        if (data) {
            let tableHTML = `
                <table class="tsd-table">
                    <thead>
                        <tr>
                            <th>Название ТСД</th>
                            <th>Заряд батареи</th>
                            <th>Статус</th>
                        </tr>
                    </thead>
                <tbody>
            `;

            for (let id in data) {
                const tsd = data[id];
                const batteryClass = tsd.battery < 20 ? 'battery-low' : 'battery-ok';
                const safeStatus = tsd.status ? tsd.status.trim().toLowerCase() : '';
                let statusIcon = '❓ Неизвестно';

                if (safeStatus === 'working') {
                    statusIcon = '🟢 В работе';
                } else if (safeStatus === 'charging') {
                    statusIcon = '🔌 На зарядке';
                } else {
                    statusIcon = `⚠️ Ошибка: ${tsd.status}`;
                }

                tableHTML += `
                    <tr>
                        <td class="tsd-name-click" style="cursor: pointer; color: #007bff; font-weight: bold; text-decoration: underline;">${id}</td>
                        <td><span class="battery-badge ${batteryClass}">${tsd.battery}%</span></td>
                        <td>${statusIcon}</td>
                    </tr>
                `;
            }

            tableHTML += '</tbody></table>';
            displayDiv.innerHTML = tableHTML;
        
        } else {
            displayDiv.innerHTML = "В базе пока нет данных о терминалах.";
        }
    });

    // --- ЖУРНАЛ ИСТОРИИ ---
    let fullHistory = {}; 
    const historyRef = ref(database, 'history');

    onValue(historyRef, (snapshot) => {
        fullHistory = snapshot.val() || {};
        renderHistory(); 
    });

    document.getElementById('tsdFilter').addEventListener('input', renderHistory);

    function renderHistory() {
        const filterValue = document.getElementById('tsdFilter').value.trim().toLowerCase();
        const logListDiv = document.getElementById('log-list');

        let tableHTML = `
            <table class="tsd-table" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
                <thead>
                    <tr style="background-color: #f2f2f2; text-align: left;">
                        <th style="padding: 10px; border: 1px solid #ddd;">Дата и время</th>
                        <th style="padding: 10px; border: 1px solid #ddd;">Устройство</th>
                        <th style="padding: 10px; border: 1px solid #ddd;">Событие</th>
                    </tr>
                </thead>
                <tbody>
        `;

        const keys = Object.keys(fullHistory).reverse();
        let hasRecords = false;

        for (let key of keys) {
            const item = fullHistory[key];
            
            if (!item.tsd || !item.status || !item.time) continue;
            if (filterValue && !item.tsd.toLowerCase().includes(filterValue)) continue;

            hasRecords = true;
            tableHTML += `
                <tr>
                    <td style="padding: 10px; border: 1px solid #ddd;">${item.time}</td>
                    <td style="padding: 10px; border: 1px solid #ddd;"><strong>${item.tsd}</strong></td>
                    <td style="padding: 10px; border: 1px solid #ddd;">${item.status}</td>
                </tr>
            `;
        }

        tableHTML += '</tbody></table>';
        logListDiv.innerHTML = hasRecords ? tableHTML : "<p style='color: #666; font-style: italic;'>Событий не найдено.</p>";
    }

    // --- ЛОГИКА ОКНА СОТРУДНИКОВ ---
    const tsdStaffMap = {
        "TSD_0": ["Губанова А.А."],
        "TSD_01": ["Назаретян Аза", "Бычкова Ольга"],
        "TSD_02": ["Асланян Люсье", "Цыкорина Оксана"],
    };

    document.addEventListener('click', function (e) {
        if (e.target && e.target.classList.contains('tsd-name-click')) {
            const tsdId = e.target.textContent.trim(); 
            openStaffModal(tsdId);
        }
    });

    function openStaffModal(tsdId) {
        const modal = document.getElementById('staff-modal');
        const title = document.getElementById('modal-title');
        const listContainer = document.getElementById('modal-staff-list');
        
        title.innerHTML = `📍 Рабочая смена для <span style="color:#007bff">${tsdId}</span>`;
        listContainer.innerHTML = '';
        
        const staffArray = tsdStaffMap[tsdId];
        
        if (staffArray && staffArray.length > 0) {
            staffArray.forEach(worker => {
                const li = document.createElement('li');
                li.innerHTML = `• ${worker}`;
                listContainer.appendChild(li);
            });
        } else {
            listContainer.innerHTML = '<li style="color: #94a3b8; font-style: italic;">Сотрудники за этим столом не закреплены</li>';
        }
        
        modal.style.display = 'flex';
    }

    document.getElementById('closeModalBtn').addEventListener('click', () => {
        document.getElementById('staff-modal').style.display = 'none';
    });

    window.addEventListener('click', (e) => {
        const modal = document.getElementById('staff-modal');
        if (e.target === modal) {
            modal.style.display = 'none';
        }
    });

    // --- ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ВКЛАДОК ---
    const btnStatus = document.getElementById('btn-status');
    const btnLogs = document.getElementById('btn-logs');
    const tabStatusContent = document.getElementById('tab-status-content');
    const tabLogsContent = document.getElementById('tab-logs-content');

    btnStatus.addEventListener('click', () => {
        tabStatusContent.style.display = 'block';
        tabLogsContent.style.display = 'none';
        btnStatus.classList.add('active');
        btnLogs.classList.remove('active');
    });

    btnLogs.addEventListener('click', () => {
        tabStatusContent.style.display = 'none';
        tabLogsContent.style.display = 'block';
        btnStatus.classList.remove('active');
        btnLogs.classList.add('active');
    });
</script>

<div id="staff-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); display: none; justify-content: center; align-items: center; z-index: 10000; font-family: sans-serif;">
    <div style="background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 340px; box-sizing: border-box;">
        <h3 id="modal-title" style="margin-top: 0; color: #1e293b; font-size: 18px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">
            Закрепленные сотрудники
        </h3>
        <ul id="modal-staff-list" style="list-style-type: none; padding: 0; margin: 20px 0; font-size: 16px; color: #334155; line-height: 2;"></ul>
        <button id="closeModalBtn" style="width: 100%; padding: 12px; background-color: #64748b; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s;">
            Закрыть
        </button>
    </div>
</div>

</body>
</html>
